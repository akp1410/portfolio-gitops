apiVersion: apps/v1
kind: Deployment

metadata:
  name: portfolio-app
  namespace: portfolio

spec:
  replicas: 1

  selector:
    matchLabels:
      app: portfolio-app

  template:
    metadata:
      labels:
        app: portfolio-app

    spec:
      containers:
      - name: portfolio-app

        image: akd2025/portfolio:1d174f81c94ded9a0f4f2ea661c359a6b14ec06d

        imagePullPolicy: Always

        ports:
        - containerPort: 3000

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"

          limits:
            memory: "256Mi"
            cpu: "200m"

        # livenessProbe:
        #   httpGet:
        #     path: /
        #     port: 3000
        #   initialDelaySeconds: 20
        #   periodSeconds: 10

        # readinessProbe:
        #   httpGet:
        #     path: /
        #     port: 3000
        #   initialDelaySeconds: 10
        #   periodSeconds: 5